<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Inteligente</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="form-container">
    <h1>Cadastro Inteligente</h1>
    <p class="subtitle">Preencha os dados abaixo para criar sua conta.</p>

    <form id="cadastroForm" novalidate>
      <div class="form-group">
        <label for="nome">Nome completo *</label>
        <input
          type="text"
          id="nome"
          name="nome"
          placeholder="Digite seu nome completo"
          required
          minlength="3"
          autocomplete="name"
        >
        <span class="error-msg" id="nome-error"></span>
      </div>

      <div class="form-group">
        <label for="email">E-mail *</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Digite seu e-mail"
          required
          autocomplete="email"
        >
        <span class="error-msg" id="email-error"></span>
      </div>

      <div class="form-group">
        <label for="senha">Senha *</label>
        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="Crie uma senha"
          required
          minlength="8"
          autocomplete="new-password"
        >
        <span class="error-msg" id="senha-error"></span>
      </div>

      <div class="form-group strength-wrapper">
        <div class="password-strength">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <small id="strengthText"></small>
      </div>

      <div class="form-group">
        <label for="confirmarSenha">Confirmar senha *</label>
        <input
          type="password"
          id="confirmarSenha"
          name="confirmarSenha"
          placeholder="Digite a senha novamente"
          required
          minlength="8"
          autocomplete="new-password"
        >
        <span class="error-msg" id="confirmarSenha-error"></span>
      </div>

      <button type="submit" id="submitBtn">Cadastrar</button>

      <p id="mensagemSucesso" class="success-message"></p>
    </form>
  </main>

  <script src="js/sistema.js"></script>
</body>
</html>
